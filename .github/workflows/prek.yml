name: Prek action

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

permissions: {}

jobs:
  prek:
    runs-on: ubuntu-latest
    name: "prek"
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: j178/prek-action@53276d8b0d10f8b6672aa85b4588c6921d0370cc # v2
